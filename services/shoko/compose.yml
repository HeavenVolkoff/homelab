services:
  shoko:
    image: docker.io/shokoanime/server:daily@sha256:ba4a9ca79f710d849c2066d30e315439b73ec8ce69a62da9193cd5f1b150632a
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          memory: 200M
    volumes:
      - ${MEDIA_DIR:?Missing media dir}:/media/Animes:/media/Animes
      - ${ROOT_DIR:?Missing root dir}/runtime/shoko:/home/shoko/.shoko
    hostname: shoko-{{.Service.ID}}
    environment:
      AVDUMP_MONO: 'true'
